<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Encuesta Perú 2026</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.card{background:white;padding:15px;border-radius:12px;margin:12px 0;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.row{display:flex;align-items:center;gap:15px;}
.photo{width:70px;height:70px;border-radius:50%;object-fit:cover;}
.info{flex:1;}
.name{font-weight:bold;margin-bottom:8px;}
.parties{display:flex;gap:5px;}
.parties img{width:40px;height:40px;object-fit:contain;}
.vote-btn{margin-top:10px;width:100%;padding:10px;border:none;border-radius:8px;background:#007bff;color:white;font-weight:bold;}
.result-bar{height:8px;background:#ddd;border-radius:5px;overflow:hidden;margin-top:5px;}
.result-fill{height:100%;background:#007bff;}
</style>
</head>

<body>

<h2>🗳️ Encuesta Nacional Perú 2026</h2>
<h3 id="total">Cargando...</h3>

<div id="captcha-container">
  <div class="cf-turnstile"
       data-sitekey="0x4AAAAAAC656M94nRwbslEL"
       data-callback="onCaptchaSuccess"
       data-expired-callback="onCaptchaExpired">
  </div>
</div>

<div id="options"></div>

<script>

const BACKEND = "https://vote-app-hugt.onrender.com";

let device_id = localStorage.getItem("device_id");
if (!device_id) {
  try{
    device_id = crypto.randomUUID();
  }catch(e){
    device_id = "dev-" + Date.now() + "-" + Math.random().toString(36).substring(2);
  }
  localStorage.setItem("device_id", device_id);
}

let votingInProgress = false;
let captchaToken = null;
let loadingUI = false;

function onCaptchaSuccess(token){
  captchaToken = token;
}

function onCaptchaExpired(){
  captchaToken = null;
}

const candidates = [
{id:4,name:"Keiko Fujimori",img:"img/Keiko.jpg",parties:["img/keiko (2).webp"]},
{id:1,name:"Rafael López Aliaga",img:"img/aliaga.jpg",parties:["img/renovacion popular aliaga.webp"]},
{id:2,name:"Carlos Álvarez",img:"img/alvarez.jpg",parties:["img/alvarez pais para todos.webp"]},
{id:3,name:"Ricardo Belmont",img:"img/belmont.jpg",parties:["img/obras belmont.webp"]},
{id:5,name:"Alfonso López Chau",img:"img/lopez.jpg",parties:["img/nacion lopez.webp"]},
{id:6,name:"Jorge Nieto",img:"img/nieto.jpg",parties:["img/buen gobierno nieto.webp"]},
{id:7,name:"Roberto Sanchez",img:"img/sanchez.jpg",parties:["img/juntos por el peru sanchez.webp"]},
{id:8,name:"Maria Perez Tello",img:"img/tello.jpg",parties:["img/primero la gente tello.webp"]},
{id:9,name:"Enrique Valderrama",img:"img/valderrama.jpg",parties:["img/apra valderrama.webp"]}
];

async function fetchWithTimeout(url, options={}, timeout=8000){
  const controller = new AbortController();
  const id = setTimeout(()=>controller.abort(), timeout);
  try{
    const res = await fetch(url,{...options, signal:controller.signal});
    clearTimeout(id);
    return res;
  }catch(e){
    clearTimeout(id);
    throw e;
  }
}

async function loadUI(){
  if(loadingUI) return;
  loadingUI = true;

  try{
    const res = await fetchWithTimeout(BACKEND + "/results/1");
    const data = await res.json();

    const total = parseInt(data.total) || 0;
    document.getElementById("total").innerText="🔥 Total votos: "+total;

    const enriched = candidates.map(c=>{
      const found = data.results?.find(r => Number(r.option_id) === Number(c.id));
      const votes = found ? (parseInt(found.votes) || 0) : 0;
      const percent = total > 0 ? ((votes/total)*100) : 0;
      return {...c, votes, percent};
    });

    enriched.sort((a,b)=> b.votes - a.votes);

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML="";

    enriched.forEach(c=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <div class="row">
          <img src="${c.img}" class="photo" onerror="this.onerror=null;this.src='img/default.jpg'">
          <div class="info">
            <div class="name">${c.name}</div>
            <div class="parties">
              ${c.parties.map(p=>`<img src="${p}" onerror="this.style.display='none'">`).join("")}
            </div>
          </div>
        </div>

        <button class="vote-btn">Votar</button>

        <div style="margin-top:10px;">
          <div style="font-size:12px;">${c.votes} votos (${c.percent.toFixed(1)}%)</div>
          <div class="result-bar">
            <div class="result-fill" style="width:${c.percent}%"></div>
          </div>
        </div>
      `;

      const btn = div.querySelector("button");

      btn.onclick=async ()=>{
        if(votingInProgress) return;
        votingInProgress = true;

        if(!captchaToken){
          alert("Completa el captcha");
          votingInProgress = false;
          return;
        }

        btn.disabled = true;

        try{
          const res = await fetchWithTimeout(BACKEND + "/vote", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              option_id:c.id,
              device_id,
              captcha:captchaToken
            })
          });

          const data = await res.json();

          if(!res.ok){
            alert(data.error || "Error voto");
            btn.disabled = false;
            votingInProgress = false;
            return;
          }

          if(data.ok){
            try{
              if(window.turnstile && turnstile.reset){
                turnstile.reset();
              }
            }catch(e){}

            captchaToken = null;
            loadUI();
          }

        }catch(e){
          alert("Error conexión backend");
          btn.disabled = false;
        }

        votingInProgress=false;
      };

      optionsDiv.appendChild(div);
    });

  }catch(e){
    document.getElementById("total").innerText="❌ Error conectando";
  }

  loadingUI = false;
}

loadUI();

setInterval(()=>{
  if(document.visibilityState === "visible"){
    loadUI();
  }
},8000);

</script>

</body>
</html>
