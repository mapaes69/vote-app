<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Encuesta Perú 2026</title>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>

<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.card{background:white;padding:15px;border-radius:12px;margin:12px 0;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.row{display:flex;align-items:center;gap:15px;}
.photo{width:70px;height:70px;border-radius:50%;}
.info{flex:1;}
.name{font-weight:bold;margin-bottom:8px;}
.parties{display:flex;gap:5px;}
.parties img{width:40px;height:40px;object-fit:contain;}
.vote-btn{margin-top:10px;width:100%;padding:10px;border:none;border-radius:8px;background:#007bff;color:white;font-weight:bold;}
.result-bar{height:8px;background:#ddd;border-radius:5px;overflow:hidden;margin-top:5px;}
.result-fill{height:100%;background:#007bff;}
</style>
</head>

<body>

<h2>🗳️ Encuesta Nacional Perú 2026</h2>
<h3 id="total">Cargando...</h3>

<div id="captcha-container"></div>

<div id="options"></div>

<script>

const BACKEND = window.location.origin;

let device_id = localStorage.getItem("device_id");
if (!device_id) {
  device_id = crypto.randomUUID();
  localStorage.setItem("device_id", device_id);
}

let votingInProgress = false;
let captchaToken = null;
let alreadyVoted = localStorage.getItem("voted") === "true";
let widgetId = null;

function onCaptchaSuccess(token){ 
  captchaToken = token; 
  console.log("captcha OK");
}
function onCaptchaExpired(){ captchaToken = null; }
function onCaptchaError(){ captchaToken = null; }

window.onload = () => {
  if(window.turnstile){
    widgetId = turnstile.render("#captcha-container", {
      sitekey: "0x4AAAAAAC3RCgNGrkg5zYVQ",
      callback: onCaptchaSuccess,
      "expired-callback": onCaptchaExpired,
      "error-callback": onCaptchaError
    });
  }
};

const candidates = [
  {id:1,name:"Keiko Fujimori",img:"img/keiko.jpg",parties:["img/fuerza.jpg"]},
  {id:2,name:"Rafael López Aliaga",img:"img/rafael.jpg",parties:["img/renovacion.jpg"]},
  {id:3,name:"Carlos Álvarez",img:"img/carlos.jpg",parties:["img/partido.jpg"]}
];

async function loadUI(){
  try{
    const res = await fetch(BACKEND + "/results/1");
    const data = await res.json();

    document.getElementById("total").innerText="🔥 Total votos: "+data.total;

    const enriched = candidates.map(c=>{
      const found = data.results?.find(r => r.option_id == c.id);
      const votes = found ? parseInt(found.votes) : 0;
      const percent = data.total > 0 ? ((votes/data.total)*100) : 0;
      return {...c, votes, percent};
    });

    enriched.sort((a,b)=> b.votes - a.votes);

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML="";

    enriched.forEach(c=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <div class="row">
          <img src="${c.img}" class="photo">
          <div class="info">
            <div class="name">${c.name}</div>
          </div>
        </div>

        <button class="vote-btn" ${alreadyVoted ? "disabled style='background:#999'" : ""}>
          ${alreadyVoted ? "Ya votaste" : "Votar"}
        </button>

        <div style="margin-top:10px;">
          <div style="font-size:12px;">${c.votes} votos (${c.percent.toFixed(1)}%)</div>
          <div class="result-bar">
            <div class="result-fill" style="width:${c.percent}%"></div>
          </div>
        </div>
      `;

      const btn = div.querySelector("button");

      btn.onclick=async ()=>{
        if(votingInProgress) return;

        if(alreadyVoted){
          alert("Ya votaste.");
          return;
        }

        if(!captchaToken){
          alert("Completa el captcha primero");
          return;
        }

        votingInProgress = true;
        btn.disabled = true;

        try{
          const res = await fetch(BACKEND + "/vote", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              option_id:c.id,
              poll_id:1,
              device_id,
              captcha:captchaToken
            })
          });

          const data = await res.json();

          if(data.ok){
            localStorage.setItem("voted","true");
            alreadyVoted = true;

            if(window.turnstile){
              turnstile.reset(widgetId);
            }

            captchaToken = null;
            loadUI();

          }else{
            alert(data.error);
            btn.disabled = false;
          }

        }catch(e){
          alert("Error conexión backend");
          btn.disabled = false;
        }

        votingInProgress=false;
      };

      optionsDiv.appendChild(div);
    });

  }catch(e){
    document.getElementById("total").innerText="❌ Error conectando";
  }
}

loadUI();
setInterval(loadUI,5000);

</script>

</body>
</html>
