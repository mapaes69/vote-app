<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Encuesta Perú 2026</title>

<!-- ✅ FIX: quitar render=explicit -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" defer></script>

<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5;}
.card{background:white;padding:15px;border-radius:12px;margin:12px 0;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.row{display:flex;align-items:center;gap:15px;}
.photo{width:70px;height:70px;border-radius:50%;}
.info{flex:1;}
.name{font-weight:bold;margin-bottom:8px;}
.parties{display:flex;gap:5px;}
.parties img{width:40px;height:40px;object-fit:contain;}
.vote-btn{margin-top:10px;width:100%;padding:10px;border:none;border-radius:8px;background:#007bff;color:white;font-weight:bold;}
.result-bar{height:8px;background:#ddd;border-radius:5px;overflow:hidden;margin-top:5px;}
.result-fill{height:100%;background:#007bff;}
</style>
</head>

<body>

<h2>🗳️ Encuesta Nacional Perú 2026</h2>
<h3 id="total">Cargando...</h3>

<div id="captcha-container">
  <div id="turnstile-widget"></div>
</div>

<div id="options"></div>

<script>

const BACKEND = window.location.origin;

let device_id = localStorage.getItem("device_id");
if (!device_id) {
  device_id = crypto.randomUUID();
  localStorage.setItem("device_id", device_id);
}

let votingInProgress = false;
let captchaToken = null;
let captchaRendered = false;

// 🔥 FIX DEFINITIVO
function initCaptcha(){

  if(captchaRendered) return;

  if (window.turnstile && document.getElementById("turnstile-widget")) {

    try{
      turnstile.render('#turnstile-widget', {
        sitekey: '0x4AAAAAAC3RCgNGrkg5zYVQ',
        callback: function(token) {
          console.log("captcha OK");
          captchaToken = token;
        },
        'expired-callback': function() {
          captchaToken = null;
        },
        'error-callback': function() {
          captchaToken = null;
        }
      });

      captchaRendered = true;

    }catch(e){
      console.log("error render captcha", e);
      setTimeout(initCaptcha, 1000);
    }

  } else {
    setTimeout(initCaptcha, 500);
  }
}

// 🔥 mantener tu lógica intacta
document.addEventListener("DOMContentLoaded", function(){
  initCaptcha();
});

const candidates = [
{id:4,name:"Keiko Fujimori",img:"img/Keiko.jpg",parties:["img/keiko (2).webp"]},
{id:1,name:"Rafael López Aliaga",img:"img/aliaga.jpg",parties:["img/renovacion popular aliaga.webp"]},
{id:2,name:"Carlos Álvarez",img:"img/alvarez.jpg",parties:["img/alvarez pais para todos.webp"]},
{id:3,name:"Ricardo Belmont",img:"img/belmont.jpg",parties:["img/obras belmont.webp"]},
{id:5,name:"Alfonso López Chau",img:"img/lopez.jpg",parties:["img/nacion lopez.webp"]},
{id:6,name:"Jorge Nieto",img:"img/nieto.jpg",parties:["img/buen gobierno nieto.webp"]},
{id:7,name:"Roberto Sanchez",img:"img/sanchez.jpg",parties:["img/juntos por el peru sanchez.webp"]},
{id:8,name:"Maria Perez Tello",img:"img/tello.jpg",parties:["img/primero la gente tello.webp"]},
{id:9,name:"Enrique Valderrama",img:"img/valderrama.jpg",parties:["img/apra valderrama.webp"]}
];

async function loadUI(){
  try{
    const res = await fetch(BACKEND + "/results/1");

    if(!res.ok){
      throw new Error("HTTP error " + res.status);
    }

    const data = await res.json();

    document.getElementById("total").innerText="🔥 Total votos: "+data.total;

    const enriched = candidates.map(c=>{
      const found = data.results?.find(r => r.option_id == c.id);
      const votes = found ? parseInt(found.votes) : 0;
      const percent = data.total > 0 ? ((votes/data.total)*100) : 0;
      return {...c, votes, percent};
    });

    enriched.sort((a,b)=> b.votes - a.votes);

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML="";

    enriched.forEach(c=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <div class="row">
          <img src="${c.img}" class="photo" onerror="this.src='img/default.jpg'">
          <div class="info">
            <div class="name">${c.name}</div>
            <div class="parties">
              ${c.parties.map(p=>`<img src="${p}">`).join("")}
            </div>
          </div>
        </div>

        <button class="vote-btn">Votar</button>

        <div style="margin-top:10px;">
          <div style="font-size:12px;">${c.votes} votos (${c.percent.toFixed(1)}%)</div>
          <div class="result-bar">
            <div class="result-fill" style="width:${c.percent}%"></div>
          </div>
        </div>
      `;

      const btn = div.querySelector("button");

      btn.onclick=async ()=>{
        if(votingInProgress) return;

        if(!captchaToken){
          alert("Completa el captcha primero");
          return;
        }

        votingInProgress = true;

        try{
          const res = await fetch(BACKEND + "/vote", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
              option_id:c.id,
              poll_id:1,
              device_id,
              captcha:captchaToken
            })
          });

          const data = await res.json();

          if(data.ok){
            if(window.turnstile){
              turnstile.reset();
            }

            captchaToken = null;
            loadUI();

          }else{
            alert(data.error);
          }

        }catch(e){
          alert("Error conexión backend");
          console.error(e);
        }

        votingInProgress=false;
      };

      optionsDiv.appendChild(div);
    });

  }catch(e){
    console.error("Error loadUI:", e);
    document.getElementById("total").innerText="❌ Error conectando al servidor";
  }
}

loadUI();
setInterval(loadUI,5000);

</script>

</body>
</html>
